name: build

on:
  push:
    branches: [main]
    tags: ['[0-9]*.[0-9]*.[0-9]*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Ruff check + format
        run: |
          uv run ruff check
          uv run ruff format --check

      - name: Unit tests
        run: uv run pytest -q

  # ── Test matrix (macOS + Linux, Python 3.10 & 3.13) ─────────────────────
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Unit tests
        run: uv run pytest -q

      - name: Import smoke test
        run: |
          uv run python - <<'EOF'
          from radiacode import RadiaCode, RealTimeData, RawData, Spectrum
          from radiacode.transports.bluetooth import BluetoothBleak, BluepyBluetooth, DeviceNotFound
          import platform
          print(f"platform: {platform.system()}")
          print(f"BluetoothBleak: {BluetoothBleak}")
          print(f"BluepyBluetooth: {BluepyBluetooth}")
          print("import OK")
          EOF

  # ── Release (tag push only) ───────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheel + sdist
        run: uv build

      - name: Generate release notes from git log
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## Changes in ${{ github.ref_name }}"
            echo ""
            if [ -n "$PREV" ]; then
              git log --oneline "${PREV}..HEAD" \
                --pretty=format:"- [%h](https://github.com/Steaeavean/radiacode_stuff/commit/%H) %s"
            else
              # Initial release — show all commits except the upstream import baseline
              git log --oneline \
                --pretty=format:"- [%h](https://github.com/Steaeavean/radiacode_stuff/commit/%H) %s" \
                | grep -v "import upstream cdump/radiacode" \
                | grep -v "Initial commit"
            fi
          } > changelog.md
          cat changelog.md

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false
          body_path: changelog.md
          files: dist/*
